name: Playwright E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

defaults:
  run:
    working-directory: playwright-demo

jobs:
  # ─── Job 1: Ejecutar pruebas ───────────────────────────────────────────────
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    env:
      USER_NAME: ${{ secrets.USER_NAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: playwright-demo/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores de Playwright
        run: npx playwright install --with-deps

      - name: Ejecutar pruebas
        run: npm test

      - name: Subir reporte HTML de Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-demo/playwright-report/
          retention-days: 30

      - name: Subir resultados Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: playwright-demo/allure-results/
          retention-days: 30

      - name: Subir traces y videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: playwright-demo/test-results/
          retention-days: 7

  # ─── Job 2: Generar reporte Allure ────────────────────────────────────────
  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Descargar resultados Allure
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generar reporte Allure
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history

      - name: Subir reporte Allure como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

  # ─── Job 3: Publicar reportes en GitHub Pages ─────────────────────────────
  deploy-report:
    name: Deploy Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main' && always()

    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Descargar reporte Allure
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: ./allure-report

      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
